services:
  postgres:
    image: postgres:17-alpine
    container_name: socialbuddy-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: socialbuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - socialbuddy-net

  minio:
    image: minio/minio:latest
    container_name: socialbuddy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console/UI
    volumes:
      - minio_data:/data
    networks:
      - socialbuddy-net

networks:
  socialbuddy-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
